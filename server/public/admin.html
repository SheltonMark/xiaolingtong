<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小灵通 - 后台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --bg-card: #1a1d27; --bg-sidebar: #141620; --bg-hover: #232736;
  --border: #2a2d3a; --border-light: #333648;
  --text: #e4e6ed; --text-sec: #8b8fa3; --text-muted: #5c6078;
  --accent: #3b82f6; --accent-h: #2563eb;
  --green: #22c55e; --red: #ef4444; --orange: #f59e0b; --cyan: #06b6d4;
  --r: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Inter,-apple-system,sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
input,select,button,textarea { font-family:inherit; }
.login-wrap { display:flex; justify-content:center; align-items:center; height:100vh; background:var(--bg); background-image:radial-gradient(ellipse at 20% 50%,rgba(59,130,246,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(6,182,212,.06) 0%,transparent 50%); }
.login-card { width:400px; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:48px 40px; box-shadow:0 8px 32px rgba(0,0,0,.4); }
.login-logo { text-align:center; margin-bottom:36px; }
.login-logo .logo-icon { width:48px; height:48px; background:var(--accent); border-radius:12px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:16px; }
.login-logo .logo-icon svg { width:24px; height:24px; fill:#fff; }
.login-logo h2 { font-size:22px; font-weight:600; letter-spacing:-.3px; }
.login-logo p { font-size:13px; color:var(--text-muted); margin-top:6px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; font-size:13px; font-weight:500; color:var(--text-sec); margin-bottom:6px; }
.form-group input,.form-group textarea,.form-group select { width:100%; padding:11px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
.form-group input:focus,.form-group textarea:focus { border-color:var(--accent); }
.form-group input::placeholder { color:var(--text-muted); }
.login-btn { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:background .2s; margin-top:6px; }
.login-btn:hover { background:var(--accent-h); }
.login-err { color:var(--red); text-align:center; margin-top:14px; font-size:13px; min-height:20px; }
.layout { display:none; min-height:100vh; }
.sidebar { position:fixed; left:0; top:0; bottom:0; width:240px; background:var(--bg-sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:10; }
.sidebar-brand { padding:24px 20px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
.sidebar-brand .brand-dot { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sidebar-brand .brand-dot svg { width:16px; height:16px; fill:#fff; }
.sidebar-brand span { font-size:16px; font-weight:600; }
.sidebar-nav { flex:1; padding:12px 10px; overflow-y:auto; }
.menu-group { font-size:11px; color:var(--text-muted); padding:16px 14px 6px; text-transform:uppercase; letter-spacing:1px; }
.menu-item { padding:10px 14px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-sec); transition:all .15s; display:flex; align-items:center; gap:10px; margin-bottom:2px; }
.menu-item svg { width:18px; height:18px; opacity:.6; flex-shrink:0; }
.menu-item:hover { background:var(--bg-hover); color:var(--text); }
.menu-item.active { background:rgba(59,130,246,.12); color:var(--accent); }
.menu-item.active svg { opacity:1; }
.sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); }
.sidebar-footer .admin-info { font-size:12px; color:var(--text-muted); margin-bottom:8px; display:block; }
.sidebar-footer .logout-btn { font-size:12px; color:var(--red); cursor:pointer; background:none; border:none; padding:0; font-weight:500; }
.main { margin-left:240px; padding:28px 32px; min-height:100vh; }
.page-header { margin-bottom:28px; }
.page-header h3 { font-size:20px; font-weight:600; }
.page-header p { font-size:13px; color:var(--text-muted); margin-top:4px; }
.stat-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:22px 20px; transition:border-color .2s; }
.stat-card:hover { border-color:var(--border-light); }
.stat-card .sc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.stat-card .sc-label { font-size:13px; color:var(--text-sec); font-weight:500; }
.stat-card .sc-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; }
.stat-card .sc-icon svg { width:18px; height:18px; }
.stat-card .sc-value { font-size:30px; font-weight:700; letter-spacing:-.5px; }
.sc-blue .sc-icon { background:rgba(59,130,246,.12); } .sc-blue .sc-icon svg { fill:var(--accent); } .sc-blue .sc-value { color:var(--accent); }
.sc-green .sc-icon { background:rgba(34,197,94,.12); } .sc-green .sc-icon svg { fill:var(--green); } .sc-green .sc-value { color:var(--green); }
.sc-orange .sc-icon { background:rgba(245,158,11,.12); } .sc-orange .sc-icon svg { fill:var(--orange); } .sc-orange .sc-value { color:var(--orange); }
.sc-cyan .sc-icon { background:rgba(6,182,212,.12); } .sc-cyan .sc-icon svg { fill:var(--cyan); } .sc-cyan .sc-value { color:var(--cyan); }
.sc-red .sc-icon { background:rgba(239,68,68,.12); } .sc-red .sc-icon svg { fill:var(--red); } .sc-red .sc-value { color:var(--red); }
.panel { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:24px; margin-bottom:20px; }
.panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.panel-header h4 { font-size:15px; font-weight:600; }
.toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.toolbar input,.toolbar select { padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; outline:none; }
.toolbar select option { background:var(--bg-card); }
.toolbar .search-btn,.toolbar .add-btn { padding:8px 16px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; }
.toolbar .search-btn:hover,.toolbar .add-btn:hover { background:var(--accent-h); }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { padding:12px 10px; text-align:left; color:var(--text-muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
td { padding:13px 10px; border-bottom:1px solid rgba(42,45,58,.6); color:var(--text-sec); }
tr:hover td { background:rgba(35,39,54,.5); }
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; }
.badge-green { background:rgba(34,197,94,.12); color:var(--green); }
.badge-red { background:rgba(239,68,68,.12); color:var(--red); }
.badge-blue { background:rgba(59,130,246,.12); color:var(--accent); }
.badge-orange { background:rgba(245,158,11,.12); color:var(--orange); }
.badge-gray { background:rgba(92,96,120,.15); color:var(--text-muted); }
.btn { padding:5px 14px; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:500; margin-right:4px; transition:opacity .2s; }
.btn:hover { opacity:.85; }
.btn-primary { background:rgba(59,130,246,.15); color:var(--accent); }
.btn-success { background:rgba(34,197,94,.15); color:var(--green); }
.btn-danger { background:rgba(239,68,68,.15); color:var(--red); }
.btn-warning { background:rgba(245,158,11,.15); color:var(--orange); }
.pagination { display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:16px; font-size:13px; color:var(--text-muted); }
.pagination button { padding:6px 14px; border:1px solid var(--border); background:var(--bg); color:var(--text-sec); border-radius:6px; cursor:pointer; font-size:12px; }
.pagination button:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.pagination button:disabled { opacity:.3; cursor:not-allowed; }
.page-section { display:none; }
.page-section.active { display:block; }
.empty { text-align:center; padding:48px; color:var(--text-muted); font-size:13px; }
.config-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.config-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--bg); border-radius:8px; border:1px solid var(--border); }
.config-item label { flex:1; font-size:13px; color:var(--text-sec); }
.config-item input { width:120px; padding:6px 10px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; text-align:right; outline:none; }
.config-item .save-cfg { padding:4px 10px; background:var(--accent); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:12px; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:28px; width:480px; max-height:80vh; overflow-y:auto; }
.modal h4 { margin-bottom:20px; font-size:16px; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
.modal-actions button { padding:8px 20px; border-radius:6px; border:none; cursor:pointer; font-size:13px; font-weight:500; }
.modal-actions .cancel { background:var(--bg-hover); color:var(--text-sec); }
.modal-actions .confirm { background:var(--accent); color:#fff; }
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div>
      <h2>小灵通</h2>
      <p>后台管理系统</p>
    </div>
    <div class="form-group"><label>账号</label><input type="text" id="loginUser" placeholder="请输入用户名" value="admin"></div>
    <div class="form-group"><label>密码</label><input type="password" id="loginPwd" placeholder="请输入密码"></div>
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>
<div class="layout" id="layoutPage">
  <div class="sidebar">
    <div class="sidebar-brand"><div class="brand-dot"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div><span>小灵通管理</span></div>
    <div class="sidebar-nav">
      <div class="menu-group">概览</div>
      <div class="menu-item active" onclick="switchPage('dashboard',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>数据概览</div>
      <div class="menu-group">审核中心</div>
      <div class="menu-item" onclick="switchPage('posts',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>信息审核</div>
      <div class="menu-item" onclick="switchPage('certs',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>认证审核</div>
      <div class="menu-item" onclick="switchPage('reports',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>举报处理</div>
      <div class="menu-group">管理</div>
      <div class="menu-item" onclick="switchPage('users',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>用户管理</div>
      <div class="menu-item" onclick="switchPage('jobs',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4z"/></svg>招工管理</div>
      <div class="menu-item" onclick="switchPage('exposures',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>曝光管理</div>
      <div class="menu-group">系统</div>
      <div class="menu-item" onclick="switchPage('keywords',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7v10c0 1.1.9 1.99 2 1.99L16 19c.67 0 1.27-.33 1.63-.84L22 12l-4.37-6.16z"/></svg>关键词黑名单</div>
      <div class="menu-item" onclick="switchPage('notices',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>公告管理</div>
      <div class="menu-item" onclick="switchPage('configs',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>系统配置</div>
    </div>
    <div class="sidebar-footer"><span class="admin-info" id="adminName"></span><button class="logout-btn" onclick="doLogout()">退出登录</button></div>
  </div>
  <div class="main">
    <div class="page-header"><h3 id="pageTitle">数据概览</h3><p id="pageDesc">平台运营数据总览</p></div>
    <div class="page-section active" id="page-dashboard"><div class="stat-cards" id="statCards"></div></div>
    <div class="page-section" id="page-users"><div class="panel"><div class="panel-header"><h4>用户管理</h4><div class="toolbar"><select id="userRoleFilter" onchange="loadUsers()"><option value="">全部角色</option><option value="enterprise">企业</option><option value="worker">临工</option></select><input type="text" id="userKeyword" placeholder="搜索昵称/手机号"><button class="search-btn" onclick="loadUsers()">搜索</button></div></div><table><thead><tr><th>ID</th><th>昵称</th><th>角色</th><th>手机</th><th>灵豆</th><th>信用分</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="userTable"></tbody></table><div class="pagination" id="userPagination"></div></div></div>
    <div class="page-section" id="page-posts"><div class="panel"><div class="panel-header"><h4>信息审核</h4><div class="toolbar"><select id="postTypeFilter" onchange="loadPosts()"><option value="">全部类型</option><option value="purchase">采购需求</option><option value="stock">工厂库存</option><option value="process">代加工</option></select><select id="postStatusFilter" onchange="loadPosts()"><option value="">全部状态</option><option value="active">已发布</option><option value="pending">待审核</option><option value="deleted">已删除</option></select><button class="search-btn" onclick="loadPosts()">刷新</button></div></div><table><thead><tr><th>ID</th><th>类型</th><th>标题</th><th>发布者</th><th>浏览</th><th>状态</th><th>发布时间</th><th>操作</th></tr></thead><tbody id="postTable"></tbody></table><div class="pagination" id="postPagination"></div></div></div>
    <div class="page-section" id="page-certs"><div class="panel"><div class="panel-header"><h4>认证审核</h4><div class="toolbar"><select id="certTypeFilter" onchange="loadCerts()"><option value="enterprise">企业认证</option><option value="worker">临工认证</option></select><select id="certStatusFilter" onchange="loadCerts()"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已驳回</option></select><button class="search-btn" onclick="loadCerts()">刷新</button></div></div><table><thead><tr id="certHeader"></tr></thead><tbody id="certTable"></tbody></table><div class="pagination" id="certPagination"></div></div></div>
    <div class="page-section" id="page-reports"><div class="panel"><div class="panel-header"><h4>举报处理</h4></div><table><thead><tr><th>ID</th><th>类型</th><th>目标ID</th><th>原因</th><th>描述</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="reportTable"></tbody></table><div class="pagination" id="reportPagination"></div></div></div>
    <div class="page-section" id="page-jobs"><div class="panel"><div class="panel-header"><h4>招工管理</h4></div><table><thead><tr><th>ID</th><th>标题</th><th>发布者</th><th>薪资</th><th>人数</th><th>状态</th><th>发布时间</th></tr></thead><tbody id="jobTable"></tbody></table><div class="pagination" id="jobPagination"></div></div></div>
    <div class="page-section" id="page-exposures"><div class="panel"><div class="panel-header"><h4>曝光管理</h4></div><table><thead><tr><th>ID</th><th>公司/个人</th><th>金额</th><th>内容</th><th>发布时间</th><th>操作</th></tr></thead><tbody id="exposureTable"></tbody></table><div class="pagination" id="exposurePagination"></div></div></div>
    <div class="page-section" id="page-keywords"><div class="panel"><div class="panel-header"><h4>关键词黑名单</h4><div class="toolbar"><input type="text" id="newKeyword" placeholder="输入关键词"><button class="add-btn" onclick="addKeyword()">添加</button></div></div><table><thead><tr><th>ID</th><th>关键词</th><th>添加时间</th><th>操作</th></tr></thead><tbody id="keywordTable"></tbody></table></div></div>
    <div class="page-section" id="page-notices"><div class="panel"><div class="panel-header"><h4>公告管理</h4><div class="toolbar"><button class="add-btn" onclick="showNoticeModal()">发布公告</button></div></div><table><thead><tr><th>ID</th><th>标题</th><th>位置</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="noticeTable"></tbody></table></div></div>
    <div class="page-section" id="page-configs"><div class="panel"><div class="panel-header"><h4>系统配置</h4></div><div class="config-grid" id="configGrid"></div></div></div>
  </div>
</div>
<div class="modal-overlay" id="noticeModal"><div class="modal"><h4 id="noticeModalTitle">发布公告</h4><div class="form-group"><label>标题</label><input type="text" id="noticeTitle" placeholder="公告标题"></div><div class="form-group"><label>内容</label><textarea id="noticeContent" rows="4" placeholder="公告内容" style="resize:vertical"></textarea></div><div class="form-group"><label>展示位置</label><select id="noticePosition"><option value="message">消息中心</option><option value="popup">首页弹窗</option></select></div><div class="modal-actions"><button class="cancel" onclick="hideNoticeModal()">取消</button><button class="confirm" onclick="saveNotice()">确认</button></div></div></div>
<script>
const API='/api/admin';
let token=localStorage.getItem('admin_token')||'';
let currentAdmin=null;

async function api(url,opts={}){
  const res=await fetch(API+url,{method:opts.method||'GET',headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})},body:opts.body?JSON.stringify(opts.body):undefined});
  const data=await res.json();
  if(data.code===401){doLogout();return null;}
  return data.data||data;
}

async function doLogin(){
  const username=document.getElementById('loginUser').value;
  const password=document.getElementById('loginPwd').value;
  try{
    const res=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(data.code===200&&data.data){token=data.data.token;currentAdmin=data.data.admin;localStorage.setItem('admin_token',token);showLayout();}
    else{document.getElementById('loginErr').textContent=data.message||'登录失败';}
  }catch(e){document.getElementById('loginErr').textContent='网络错误';}
}

function doLogout(){token='';currentAdmin=null;localStorage.removeItem('admin_token');document.getElementById('loginPage').style.display='flex';document.getElementById('layoutPage').style.display='none';}

function showLayout(){document.getElementById('loginPage').style.display='none';document.getElementById('layoutPage').style.display='block';document.getElementById('adminName').textContent=currentAdmin?currentAdmin.nickname:'管理员';loadDashboard();}

const pageHeaders={dashboard:['数据概览','平台运营数据总览'],users:['用户管理','管理平台注册用户'],posts:['信息审核','审核发布的供需信息'],certs:['认证审核','审核企业和临工认证'],reports:['举报处理','处理用户举报信息'],jobs:['招工管理','管理招工信息'],exposures:['曝光管理','管理曝光举报信息'],keywords:['关键词黑名单','管理敏感词过滤'],notices:['公告管理','发布和管理平台公告'],configs:['系统配置','平台参数设置']};

function switchPage(name,el){
  document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el)el.classList.add('active');
  const h=pageHeaders[name]||['',''];
  document.getElementById('pageTitle').textContent=h[0];
  document.getElementById('pageDesc').textContent=h[1];
  const loaders={dashboard:loadDashboard,users:loadUsers,posts:loadPosts,certs:loadCerts,reports:loadReports,jobs:loadJobs,exposures:loadExposures,keywords:loadKeywords,notices:loadNotices,configs:loadConfigs};
  if(loaders[name])loaders[name]();
}

let userPage=1;
async function loadUsers(page){
  if(page)userPage=page;
  const role=document.getElementById('userRoleFilter').value;
  const keyword=document.getElementById('userKeyword').value;
  const d=await api('/users?page='+userPage+'&role='+role+'&keyword='+keyword);
  if(\!d)return;const list=d.list||[];
  document.getElementById('userTable').innerHTML=list.length?list.map(u=>'<tr><td>'+u.id+'</td><td>'+(u.nickname||'-')+'</td><td><span class="badge '+(u.role==='enterprise'?'badge-blue':'badge-orange')+'">'+(u.role==='enterprise'?'企业':u.role==='worker'?'临工':'未选择')+'</span></td><td>'+(u.phone||'-')+'</td><td>'+(u.beanBalance||0)+'</td><td>'+(u.creditScore||0)+'</td><td><span class="badge '+(u.status==='active'?'badge-green':'badge-red')+'">'+(u.status==='active'?'正常':'封禁')+'</span></td><td>'+(u.createdAt||'').substring(0,10)+'</td><td>'+(u.status==='active'?'<button class="btn btn-danger" onclick="banUser('+u.id+')">封禁</button>':'<button class="btn btn-success" onclick="unbanUser('+u.id+')">解封</button>')+'<button class="btn btn-primary" onclick="promptCredit('+u.id+','+(u.creditScore||0)+')">信用分</button></td></tr>').join(''):'<tr><td colspan="9" class="empty">暂无数据</td></tr>';
  renderPagination('userPagination',d.total,userPage,d.pageSize,'loadUsers');
}
async function banUser(id){if(confirm('确认封禁？')){await api('/users/'+id+'/ban',{method:'PUT'});loadUsers();}}
async function unbanUser(id){if(confirm('确认解封？')){await api('/users/'+id+'/unban',{method:'PUT'});loadUsers();}}
function promptCredit(id,current){var v=prompt('调整信用分（当前：'+current+'）',current);if(v\!==null&&v\!==''){api('/users/'+id+'/credit',{method:'PUT',body:{creditScore:+v}}).then(()=>loadUsers());}}

let postPage=1;
async function loadPosts(page){
  if(page)postPage=page;
  const type=document.getElementById('postTypeFilter').value;
  const status=document.getElementById('postStatusFilter').value;
  const d=await api('/posts?page='+postPage+'&type='+type+'&status='+status);
  if(\!d)return;const list=d.list||[];
  const typeMap={purchase:'采购需求',stock:'工厂库存',process:'代加工'};
  const statusMap={active:['已发布','badge-green'],pending:['待审核','badge-orange'],deleted:['已删除','badge-gray'],expired:['已过期','badge-gray']};
  document.getElementById('postTable').innerHTML=list.length?list.map(p=>{const st=statusMap[p.status]||['未知','badge-gray'];return '<tr><td>'+p.id+'</td><td><span class="badge badge-blue">'+(typeMap[p.type]||p.type)+'</span></td><td>'+((p.title||p.content||'').substring(0,30))+'</td><td>'+(p.user?p.user.nickname||'ID:'+p.userId:p.userId)+'</td><td>'+(p.viewCount||0)+'</td><td><span class="badge '+st[1]+'">'+st[0]+'</span></td><td>'+(p.createdAt||'').substring(0,10)+'</td><td>'+(p.status\!=='active'?'<button class="btn btn-success" onclick="auditPost('+p.id+','approve')">通过</button>':'')+(p.status\!=='deleted'?'<button class="btn btn-danger" onclick="auditPost('+p.id+','reject')">驳回</button>':'')+'</td></tr>';}).join(''):'<tr><td colspan="8" class="empty">暂无数据</td></tr>';
  renderPagination('postPagination',d.total,postPage,d.pageSize,'loadPosts');
}
async function auditPost(id,action){if(confirm(action==='approve'?'确认通过？':'确认驳回？')){await api('/posts/'+id+'/audit',{method:'PUT',body:{action}});loadPosts();}}

let certPage=1;
async function loadCerts(page){
  if(page)certPage=page;
  const type=document.getElementById('certTypeFilter').value;
  const status=document.getElementById('certStatusFilter').value;
  const d=await api('/certs?page='+certPage+'&type='+type+'&status='+status);
  if(\!d)return;const list=d.list||[];
  if(type==='enterprise'){
    document.getElementById('certHeader').innerHTML='<th>ID</th><th>企业名称</th><th>信用代码</th><th>联系人</th><th>电话</th><th>状态</th><th>提交时间</th><th>操作</th>';
    document.getElementById('certTable').innerHTML=list.length?list.map(c=>'<tr><td>'+c.id+'</td><td>'+c.companyName+'</td><td>'+c.creditCode+'</td><td>'+(c.contactName||'-')+'</td><td>'+(c.contactPhone||'-')+'</td><td><span class="badge '+(c.status==='pending'?'badge-orange':c.status==='approved'?'badge-green':'badge-red')+'">'+(c.status==='pending'?'待审核':c.status==='approved'?'已通过':'已驳回')+'</span></td><td>'+(c.createdAt||'').substring(0,10)+'</td><td>'+(c.status==='pending'?'<button class="btn btn-success" onclick="auditCert('enterprise','+c.id+','approve')">通过</button><button class="btn btn-danger" onclick="rejectCert('enterprise','+c.id+')">驳回</button>':'-')+'</td></tr>').join(''):'<tr><td colspan="8" class="empty">暂无数据</td></tr>';
  }else{
    document.getElementById('certHeader').innerHTML='<th>ID</th><th>姓名</th><th>身份证号</th><th>技能</th><th>状态</th><th>提交时间</th><th>操作</th>';
    document.getElementById('certTable').innerHTML=list.length?list.map(c=>'<tr><td>'+c.id+'</td><td>'+c.realName+'</td><td>'+c.idNo+'</td><td>'+(c.skills?c.skills.join(','):'-')+'</td><td><span class="badge '+(c.status==='pending'?'badge-orange':c.status==='approved'?'badge-green':'badge-red')+'">'+(c.status==='pending'?'待审核':c.status==='approved'?'已通过':'已驳回')+'</span></td><td>'+(c.createdAt||'').substring(0,10)+'</td><td>'+(c.status==='pending'?'<button class="btn btn-success" onclick="auditCert('worker','+c.id+','approve')">通过</button><button class="btn btn-danger" onclick="rejectCert('worker','+c.id+')">驳回</button>':'-')+'</td></tr>').join(''):'<tr><td colspan="7" class="empty">暂无数据</td></tr>';
  }
  renderPagination('certPagination',d.total,certPage,d.pageSize,'loadCerts');
}
async function auditCert(type,id,action){await api('/certs/'+type+'/'+id+'/audit',{method:'PUT',body:{action}});loadCerts();}
function rejectCert(type,id){var r=prompt('请输入驳回原因');if(r){api('/certs/'+type+'/'+id+'/audit',{method:'PUT',body:{action:'reject',rejectReason:r}}).then(()=>loadCerts());}}

let reportPage=1;
async function loadReports(page){
  if(page)reportPage=page;
  const d=await api('/reports?page='+reportPage);
  if(\!d)return;const list=d.list||[];
  const statusMap={pending:['待处理','badge-orange'],handled:['已处理','badge-green'],dismissed:['已驳回','badge-gray']};
  document.getElementById('reportTable').innerHTML=list.length?list.map(r=>{const st=statusMap[r.status]||['未知','badge-gray'];return '<tr><td>'+r.id+'</td><td>'+r.targetType+'</td><td>'+r.targetId+'</td><td>'+r.reason+'</td><td>'+((r.description||'').substring(0,30))+'</td><td><span class="badge '+st[1]+'">'+st[0]+'</span></td><td>'+(r.createdAt||'').substring(0,10)+'</td><td>'+(r.status==='pending'?'<button class="btn btn-success" onclick="handleReport('+r.id+','resolve')">处理</button><button class="btn btn-danger" onclick="handleReport('+r.id+','dismiss')">驳回</button>':'-')+'</td></tr>';}).join(''):'<tr><td colspan="8" class="empty">暂无数据</td></tr>';
  renderPagination('reportPagination',d.total,reportPage,d.pageSize,'loadReports');
}
async function handleReport(id,action){await api('/reports/'+id+'/handle',{method:'PUT',body:{action}});loadReports();}

let jobPage=1;
async function loadJobs(page){
  if(page)jobPage=page;
  const d=await api('/jobs?page='+jobPage);
  if(\!d)return;const list=d.list||[];
  document.getElementById('jobTable').innerHTML=list.length?list.map(j=>'<tr><td>'+j.id+'</td><td>'+(j.title||'-')+'</td><td>'+(j.user?j.user.nickname||'ID:'+j.userId:j.userId)+'</td><td>'+(j.salary||'-')+'元/'+(j.salaryMode||'时')+'</td><td>'+(j.headcount||'-')+'</td><td><span class="badge badge-green">招工中</span></td><td>'+(j.createdAt||'').substring(0,10)+'</td></tr>').join(''):'<tr><td colspan="7" class="empty">暂无数据</td></tr>';
  renderPagination('jobPagination',d.total,jobPage,d.pageSize,'loadJobs');
}

let exposurePage=1;
async function loadExposures(page){
  if(page)exposurePage=page;
  const d=await api('/exposures?page='+exposurePage);
  if(\!d)return;const list=d.list||[];
  document.getElementById('exposureTable').innerHTML=list.length?list.map(e=>'<tr><td>'+e.id+'</td><td>'+(e.company||e.contact||'-')+'</td><td>'+(e.amount||'-')+'</td><td>'+((e.description||'').substring(0,40))+'</td><td>'+(e.createdAt||'').substring(0,10)+'</td><td><button class="btn btn-danger" onclick="deleteExposure('+e.id+')">删除</button></td></tr>').join(''):'<tr><td colspan="6" class="empty">暂无数据</td></tr>';
  renderPagination('exposurePagination',d.total,exposurePage,d.pageSize,'loadExposures');
}
async function deleteExposure(id){if(confirm('确认删除？')){await api('/exposures/'+id,{method:'DELETE'});loadExposures();}}

async function loadKeywords(){
  const list=await api('/keywords');
  if(!list)return;
  document.getElementById('keywordTable').innerHTML=list.length?list.map(k=>'<tr><td>'+k.id+'</td><td>'+k.word+'</td><td>'+(k.createdAt||'').substring(0,10)+'</td><td><button class="btn btn-danger" onclick="deleteKeyword('+k.id+')">删除</button></td></tr>').join(''):'<tr><td colspan="4" class="empty">暂无关键词</td></tr>';
}
async function addKeyword(){
  const w=document.getElementById('newKeyword').value.trim();
  if(!w){alert('请输入关键词');return;}
  await api('/keywords',{method:'POST',body:{word:w}});
  document.getElementById('newKeyword').value='';
  loadKeywords();
}
async function deleteKeyword(id){if(confirm('确认删除？')){await api('/keywords/'+id,{method:'DELETE'});loadKeywords();}}

async function loadNotices(){
  const list=await api('/notices');
  if(!list)return;
  document.getElementById('noticeTable').innerHTML=list.length?list.map(n=>'<tr><td>'+n.id+'</td><td>'+n.title+'</td><td>'+(n.position==='popup'?'首页弹窗':'消息中心')+'</td><td><span class="badge '+(n.isActive?'badge-green':'badge-gray')+'">'+(n.isActive?'启用':'禁用')+'</span></td><td>'+(n.createdAt||'').substring(0,10)+'</td><td><button class="btn btn-warning" onclick="toggleNotice('+n.id+','+n.isActive+')">'+(!n.isActive?'启用':'禁用')+'</button><button class="btn btn-danger" onclick="deleteNotice('+n.id+')">删除</button></td></tr>').join(''):'<tr><td colspan="6" class="empty">暂无公告</td></tr>';
}
function showNoticeModal(){document.getElementById('noticeModal').classList.add('show');document.getElementById('noticeTitle').value='';document.getElementById('noticeContent').value='';}
function hideNoticeModal(){document.getElementById('noticeModal').classList.remove('show');}
async function saveNotice(){
  const title=document.getElementById('noticeTitle').value.trim();
  const content=document.getElementById('noticeContent').value.trim();
  const position=document.getElementById('noticePosition').value;
  if(!title||!content){alert('请填写标题和内容');return;}
  await api('/notices',{method:'POST',body:{title,content,position}});
  hideNoticeModal();loadNotices();
}
async function toggleNotice(id,current){await api('/notices/'+id,{method:'PUT',body:{isActive:current?0:1}});loadNotices();}
async function deleteNotice(id){if(confirm('确认删除？')){await api('/notices/'+id,{method:'DELETE'});loadNotices();}}

async function loadConfigs(){
  const list=await api('/configs');
  if(!list||!list.length){document.getElementById('configGrid').innerHTML='<div class="empty">暂无配置</div>';return;}
  document.getElementById('configGrid').innerHTML=list.map(c=>'<div class="config-item"><label>'+(c.label||c.key)+'</label><input id="cfg_'+c.key+'" value="'+c.value+'"><button class="save-cfg" onclick="saveConfig(''+c.key+'')">保存</button></div>').join('');
}
async function saveConfig(key){
  const v=document.getElementById('cfg_'+key).value;
  await api('/configs',{method:'PUT',body:{key,value:v}});
  alert('已保存');
}

function renderPagination(elId,total,page,pageSize,fn){
  const tp=Math.ceil(total/(pageSize||20));
  if(tp<=1){document.getElementById(elId).innerHTML='';return;}
  document.getElementById(elId).innerHTML='<span>共 '+total+' 条</span><button '+(page<=1?'disabled':'')+' onclick="'+fn+'('+(page-1)+')">上一页</button><span>'+page+' / '+tp+'</span><button '+(page>=tp?'disabled':'')+' onclick="'+fn+'('+(page+1)+')">下一页</button>';
}

if(token){api('/dashboard').then(d=>{if(d){currentAdmin={nickname:'管理员'};showLayout();}else doLogout();});}
else{document.getElementById('loginPage').style.display='flex';}
</script>
